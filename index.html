const getGenderColor = (gender, dogId, dogs, COLORS_MALE, COLORS_FEMALE, COLOR_UNKNOWN) => {
    if (gender === 'U') return COLOR_UNKNOWN;
    const palette = gender === 'F' ? COLORS_FEMALE : COLORS_MALE;
    const existingDog = dogs.find(d => d.id === dogId && d.gender === gender);
    if (existingDog && existingDog.color) return existingDog.color;
    const dogsOfSameGender = dogs.filter(d => d.gender === gender);
    return palette[dogsOfSameGender.length % palette.length];
};

const calculateAge = (birthStr) => {
    if (!birthStr) return null;
    let birthDate = null;
    if (birthStr.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) { const [d, m, y] = birthStr.split('/'); birthDate = new Date(y, m - 1, d); } 
    else if (birthStr.match(/^\d{1,2}\/\d{4}$/)) { const [m, y] = birthStr.split('/'); birthDate = new Date(y, m - 1, 1); } 
    else if (birthStr.match(/^\d{4}$/)) { birthDate = new Date(birthStr, 0, 1); } 
    else { return null; }
    if (isNaN(birthDate.getTime())) return null;
    const today = new Date();
    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    if (months < 0 || (months === 0 && today.getDate() < birthDate.getDate())) { years--; months += 12; }
    if (today.getDate() < birthDate.getDate()) { months--; }
    if (months < 0) { months += 12; }
    if (years === 0 && months === 0) return "Nouveau né";
    if (years === 0) return `${months} mois`;
    if (months === 0) return `${years} ans`;
    return `${years} ans et ${months} mois`;
};

const calculateScore = (evalData) => {
    if (!evalData) return 0;
    let score = Object.entries(evalData).reduce((sum, [key, val]) => {
        if (key === 'isBlacklisted' || key === 'blacklistReason') return sum;
        return sum + (parseInt(val) || 0);
    }, 0);
    if (evalData.isBlacklisted) score += 100;
    return score;
};

const SmartMarquee = ({ text, className }) => {
    const textRef = useRef(null);
    const containerRef = useRef(null);
    const [shouldScroll, setShouldScroll] = useState(false);
    useLayoutEffect(() => {
        if (textRef.current && containerRef.current) {
            setShouldScroll(textRef.current.offsetWidth > containerRef.current.offsetWidth);
        }
    }, [text]);
    return (
        <div ref={containerRef} className={`marquee-container ${className}`}>
            <span ref={textRef} className={`marquee-content ${shouldScroll ? 'animate-marquee' : ''}`}>
                {text}
            </span>
        </div>
    );
};

    const emails = "a.lorillon@gmail.com,g.lorillon16@gmail.com";
    const subject = encodeURIComponent(`[4Pattes] ${action} : ${data.dogName}`);
    let body = `🐶 ${action} - ${data.dogName}\n\n`;
    if (data.isAllDay) { body += `📅 NOUVEAU : Du ${new Date(data.start).toLocaleDateString()} Au ${new Date(data.end).toLocaleDateString()}\n`; } else { body += `📅 NOUVEAU : Du ${new Date(data.start).toLocaleString()} Au ${new Date(data.end).toLocaleString()}\n`; }
    body += `⏰ Journée entière : ${data.isAllDay ? 'Oui' : 'Non (' + data.startTime + ' - ' + data.endTime + ')'}\n`;
    body += `\n💰 Prix : ${data.price || 0} €\n`; body += `📝 Notes Séjour : ${data.bookingNotes || "Aucune"}\n`; body += `📝 Notes Chien : ${data.dogNotes || "Aucune"}\n`; body += `Propriétaire : ${data.ownerName || "Inconnu"}\n`; body += `Tél : ${data.phone || ""}`;

            </div>

const BehaviorEvaluation = ({ evalData, setForm, isEditing }) => {
    const updateEval = (criteriaId, val) => {
        if (!isEditing) return;
        setForm(prev => ({ ...prev, eval: { ...prev.eval, [criteriaId]: val } }));
    };
    const toggleBlacklist = () => {
        if (!isEditing) return;
        const newVal = !evalData?.isBlacklisted;
        setForm(prev => ({ ...prev, eval: { ...prev.eval, isBlacklisted: newVal } }));
    };
    const updateBlacklistReason = (txt) => {
        if (!isEditing) return;
        setForm(prev => ({ ...prev, eval: { ...prev.eval, blacklistReason: txt } }));
    };
    const currentScore = calculateScore(evalData);
    let scoreColor = 'bg-emerald-100 text-emerald-700';
    let scoreLabel = 'Facile';
    if (currentScore >= BLACKLIST_THRESHOLD) { scoreColor = 'bg-stone-800 text-white animate-pulse border-2 border-red-500'; scoreLabel = '⛔ BLACKLIST'; }
    else if (currentScore >= WARNING_THRESHOLD) { scoreColor = 'bg-red-100 text-red-700 font-bold'; scoreLabel = '⚠️⚠️ À ÉVITER'; }
    else if (currentScore > EXIGENT_THRESHOLD) { scoreColor = 'bg-orange-100 text-orange-700'; scoreLabel = '⚠️ Exigeant'; }
    const isBlacklisted = evalData?.isBlacklisted || false;
    return (
        <div className="mt-4 mb-4">
            <div className="flex justify-between items-center mb-2">
                <label className={S.label}>Évaluation ({currentScore} pts)</label>
                <span className={`text-[10px] px-3 py-1 rounded-full ${scoreColor} uppercase shadow-sm`}>{scoreLabel}</span>
            </div>
            <div className="space-y-3 bg-stone-50 p-3 rounded-xl border border-stone-100 relative">
                {EVAL_CRITERIA.map(c => {
                    const currentVal = evalData ? evalData[c.id] : 0;
                    return (
                        <div key={c.id} className="flex items-center justify-between">
                            <span className="text-xs font-bold text-stone-500 w-24">{c.label}</span>
                            <div className="flex gap-1 flex-1 justify-end flex-wrap">
                                {c.options.map((opt, i) => {
                                    const isSelected = currentVal == opt.val; 
                                    const style = isSelected ? opt.class + ' shadow-sm scale-105' : 'bg-white text-stone-400 border-stone-100 grayscale opacity-70';
                                    return ( <div key={i} onClick={() => updateEval(c.id, opt.val)} className={`text-[9px] px-2 py-1 rounded-md border transition-all ${style} ${!isEditing ? 'cursor-default' : 'cursor-pointer'}`}>{opt.label}</div> )
                                })}
                            </div>
                        </div>
                    );
                })}
                <div className="pt-4 mt-2 border-t border-stone-200">
                    <button onClick={toggleBlacklist} disabled={!isEditing} className={`w-full py-2 rounded-lg font-bold text-xs flex items-center justify-center gap-2 transition-colors ${isBlacklisted ? 'bg-stone-800 text-white hover:bg-stone-700' : 'bg-stone-200 text-stone-500 hover:bg-stone-300'}`}>{isBlacklisted ? <i className="fas fa-ban text-red-500"></i> : <i className="fas fa-ban"></i>}{isBlacklisted ? 'CHIEN BLACKLISTÉ (+100pts)' : 'BLACKLISTER CE CHIEN'}</button>
                    {isBlacklisted && (<div className="mt-2 animate-fadeIn"><label className="text-[10px] font-bold text-red-500 uppercase block mb-1">Raison du refus</label><input type="text" value={evalData?.blacklistReason || ''} onChange={(e) => updateBlacklistReason(e.target.value)} disabled={!isEditing} className="w-full text-xs p-2 border border-red-200 bg-red-50 rounded-lg text-red-900 placeholder-red-300 focus:ring-red-200" placeholder="Ex: A mordu, détruit..." /></div>)}
                </div>
            </div>

const Calendar = ({ date, setDate, openForm, bookings, dogs, isOffline }) => {
    const y = date.getFullYear(), m = date.getMonth(); const d1 = new Date(y, m, 1, 12, 0, 0); const start = new Date(d1); start.setDate(d1.getDate() - (d1.getDay()===0?6:d1.getDay()-1)); let weeks = [], curr = new Date(start);
    for(let w=0; w<6; w++) { let days = []; for(let d=0; d<7; d++) { days.push(new Date(curr)); curr.setDate(curr.getDate()+1); } if(w>4 && days[0].getMonth() !== m) break; const wStart = new Date(days[0]); wStart.setHours(0,0,0,0); const wEnd = new Date(days[6]); wEnd.setHours(23,59,59,999); const evts = bookings.filter(b => { const s=new Date(b.start); s.setHours(0,0,0,0); const e=new Date(b.end); e.setHours(0,0,0,0); return s<=wEnd && e>=wStart; }).sort((a,b)=>new Date(a.start)-new Date(b.start));
        const items = evts.map(ev => { const s=new Date(ev.start); s.setHours(0,0,0,0); const e=new Date(ev.end); e.setHours(0,0,0,0); const dur = Math.ceil((e-s)/86400000)+1; let st = Math.floor((s - wStart)/86400000); if(st<0) st=0; let en = Math.floor((e - wStart)/86400000); if(en>6) en=6; return { ...ev, dur, st, en }; });
        const placed = []; const rows = []; items.forEach(ev => { let rowIdx = 0; while(true) { if(!rows[rowIdx]) rows[rowIdx] = Array(7).fill(false); let fit = true; for(let i=ev.st; i<=ev.en; i++) if(rows[rowIdx][i]) fit=false; if(fit) { for(let i=ev.st; i<=ev.en; i++) rows[rowIdx][i] = true; placed.push({...ev, row: rowIdx}); break; } rowIdx++; } }); weeks.push({days, items: placed});

            const isRDV = ev.paymentStatus === 'appointment';
            const linkedDog = dogs.find(d => d.id === ev.dogId);
            const score = calculateScore(linkedDog?.eval);
            let badgeIcon = "";

            const cellWidth = 14.2857; const gap = cellWidth * 0.10;

            const weekStartLimit = new Date(w.days[0]); weekStartLimit.setHours(0,0,0,0);

        })}</div>))}<div style={{height:'140px'}}></div></div><div className={S.monthNav}><button onClick={()=>setDate(new Date(date.getFullYear(), date.getMonth()-1))} className={S.monthBtn}><i className="fas fa-chevron-left"></i></button><div className="relative"><span className={S.monthTitle}>{date.toLocaleString('fr',{month:'long', year:'numeric'})}</span><input type="month" className="month-picker-trigger" value={`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`} onChange={(e)=>setDate(new Date(e.target.value))}/></div><button onClick={()=>setDate(new Date(date.getFullYear(), date.getMonth()+1))} className={S.monthBtn}><i className="fas fa-chevron-right"></i></button></div></div>

    const handleDogClick = (d) => { setSelectedDog(d); window.history.pushState({ modal: true }, ''); };
    if (filter === '' && directoryMode === 'relevance') {
        const today = new Date(); today.setHours(0,0,0,0); const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
        const dogsToday = filteredDogs.filter(d => { const todayEnd = new Date(tomorrow); const activeBooking = bookings.find(b => { const bStart = new Date(b.start); const bEnd = new Date(b.end); return b.dogId === d.id && bStart < todayEnd && bEnd >= today; }); return !!activeBooking; }).sort((a, b) => a.name.localeCompare(b.name));
        dogsUpcoming = filteredDogs.filter(d => !dogsToday.some(td => td.id === d.id)).map(d => { const upcomingBooking = bookings.filter(b => b.dogId === d.id && new Date(b.start) >= tomorrow).sort((a, b) => new Date(a.start) - new Date(b.start))[0]; return { ...d, nextArrival: upcomingBooking ? new Date(upcomingBooking.start) : null }; }).filter(d => d.nextArrival).sort((a, b) => b.nextArrival ? (a.nextArrival - b.nextArrival) : -1);

        const grouped = {}; if (dogsToday.length > 0) grouped['En Garde Aujourd\'hui'] = dogsToday; if (dogsUpcoming.length > 0) grouped['Prochaines Arrivées'] = dogsUpcoming; if (dogsOther.length > 0) grouped['Autres Chiens'] = dogsOther;
        filteredDogs = Object.entries(grouped).flatMap(([label, list]) => [{ type: 'header', label }, ...list]);

        const grouped = filteredDogs.sort((a,b) => a.name.localeCompare(b.name)).reduce((acc, d) => { const l=d.name[0].toUpperCase(); if(!acc[l]) acc[l]=[]; acc[l].push(d); return acc; }, {});

// --- NOUVEAU COMPOSANT : CARTE SWIPEABLE ---
const SwipeableTask = ({ task, onMarkRead, onDelete, onClick }) => {
    const [startX, setStartX] = useState(0);
    const [currentX, setCurrentX] = useState(0);
    const [isSwiping, setIsSwiping] = useState(false);
    const contentRef = useRef(null);

    const handleTouchStart = (e) => {
        setStartX(e.touches[0].clientX);
        setIsSwiping(true);
    };

    const handleTouchMove = (e) => {
        if (!isSwiping) return;
        const diff = e.touches[0].clientX - startX;
        if (diff > -100 && diff < 100) {
            setCurrentX(diff);
        }
    };

    const handleTouchEnd = () => {
        setIsSwiping(false);
        if (currentX > 60) {
            onMarkRead(task.id);
            setCurrentX(0);
        } else if (currentX < -60) {
            onDelete(task.id);
            setCurrentX(0);
        } else {
            setCurrentX(0);
        }
    };

    const isRead = task.isRead;
    const isLeft = currentX > 0;
    const isRight = currentX < 0;

    return (
        <div className="swipe-container" style={{ opacity: isRead ? 0.6 : 1 }}>
            <div className={`swipe-bg-left`} style={{ opacity: isLeft ? 1 : 0 }}><i className="fas fa-check"></i></div>
            <div className={`swipe-bg-right`} style={{ opacity: isRight ? 1 : 0 }}><i className="fas fa-trash"></i></div>
            
            <div 
                ref={contentRef}
                className={`swipe-content ${isSwiping ? 'swiping' : ''} p-4 flex gap-4 items-center`}
                style={{ transform: `translateX(${currentX}px)` }}
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
                onClick={() => onClick(task)}
            >
                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${task.colorClass}`}>
                    <i className={`fas ${task.icon} text-lg`}></i>
                </div>
                <div className="flex-1">
                    <div className="font-bold text-stone-700 text-sm">{task.title}</div>
                    <div className="text-stone-500 text-xs mt-1 leading-tight">{task.desc}</div>
                </div>
            </div>
        </div>
    );
};

// --- NOUVEAU COMPOSANT : PAGE ASSISTANT ---
const AssistantPage = ({ dogs, bookings, openForm }) => {
    const [tasks, setTasks] = useState([]);
    
    const getTaskStates = () => JSON.parse(localStorage.getItem('4pattes_tasks') || '{}');
    const saveTaskState = (id, state) => {
        const states = getTaskStates();
        states[id] = state;
        localStorage.setItem('4pattes_tasks', JSON.stringify(states));
        generateTasks();
    };

    const generateTasks = useCallback(() => {
        const today = new Date();
        today.setHours(0,0,0,0);
        let newTasks = [];
        const taskStates = getTaskStates();

        const addAlerte = (id, type, title, desc, dogId, bookingId, colorClass, icon) => {
            if (taskStates[id] === 'deleted') return; 
            newTasks.push({ id, type, title, desc, dogId, bookingId, colorClass, icon, isRead: taskStates[id] === 'read' });
        };

        // 1. Scans des infos manquantes (Chiens + Sources des réservations)
        dogs.forEach(d => {
            let missing = [];
            if (!d.name || d.name === "Inconnu") missing.push("Nom");
            if (!d.breed) missing.push("Race");
            if (!d.owner) missing.push("Propriétaire");
            if (!d.phone) missing.push("Téléphone");
            if (d.gender === 'U') missing.push("Genre");
            if (!d.photo) missing.push("Photo");

            // Recherche des réservations de ce chien sans source
            const dogBookings = bookings.filter(b => b.dogId === d.id);
            const bookingsMissingSource = dogBookings.filter(b => !b.source);
            
            if (bookingsMissingSource.length > 0) {
                missing.push("Source");
            }

            if (missing.length > 0) {
                let targetType = 'dog';
                let targetBooking = null;
                
                if (bookingsMissingSource.length > 0) {
                    targetType = 'booking';
                    // On prend la réservation la plus récente pour ouvrir la bonne pop-up
                    bookingsMissingSource.sort((a,b) => new Date(b.start) - new Date(a.start));
                    targetBooking = bookingsMissingSource[0];
                }

                addAlerte(
                    `missing_info_${d.id}`, 
                    targetType, 
                    `Infos manquantes : ${d.name}`, 
                    `À compléter : ${missing.join(', ')}`, 
                    d.id, 
                    targetBooking, 
                    'bg-blue-100 text-blue-600', 
                    'fa-info-circle'
                );
            }
        });

        // 2. Scans des réservations (Paiement, Prix, Évaluation)
        bookings.forEach(b => {
            const endDate = new Date(b.end);
            endDate.setHours(0,0,0,0);
            const isPast = endDate < today;

            if (isPast) {
                // Paiement en attente
                if (b.paymentStatus === 'pending' || b.paymentStatus === 'deposit') {
                    addAlerte(`pay_${b.id}`, 'booking', `Paiement en attente : ${b.dogName}`, `Séjour terminé. Reste à encaisser : ${(b.price||0) - (b.deposit||0)}€`, b.dogId, b, 'bg-red-100 text-red-600', 'fa-euro-sign');
                }

                // Évaluation systématique à faire après chaque séjour
                const linkedDog = dogs.find(d => d.id === b.dogId);
                if (linkedDog) {
                    addAlerte(`eval_${b.id}`, 'dog', `Évaluer le séjour de ${b.dogName}`, `Séjour terminé. N'oubliez pas de remplir la grille de comportement.`, b.dogId, null, 'bg-orange-100 text-orange-600', 'fa-clipboard-check');
                }

                // Prix anormal (hors RDV)
                if (b.paymentStatus !== 'appointment') {
                    const startDate = new Date(b.start); startDate.setHours(0,0,0,0);
                    const nbDays = Math.max(1, Math.ceil((endDate - startDate) / 86400000) + 1);
                    const total = Number(b.price || 0);
                    const pricePerDay = total / nbDays;

                    if (total === 0) {
                        addAlerte(`price_zero_${b.id}`, 'booking', `Prix à 0€ : ${b.dogName}`, `Le séjour de ${nbDays} jours est facturé 0€. Est-ce normal ?`, b.dogId, b, 'bg-yellow-100 text-yellow-600', 'fa-exclamation-triangle');
                    } else if (pricePerDay < MIN_PRICE_PER_DAY) {
                        addAlerte(`price_low_${b.id}`, 'booking', `Prix faible : ${b.dogName}`, `Le tarif calculé est de ${Math.round(pricePerDay)}€/jour. Vérifiez le montant.`, b.dogId, b, 'bg-yellow-100 text-yellow-600', 'fa-exclamation-triangle');
                    } else if (pricePerDay > 30) {
                        addAlerte(`price_high_${b.id}`, 'booking', `Prix élevé : ${b.dogName}`, `Le tarif calculé est de ${Math.round(pricePerDay)}€/jour. Vérifiez le montant.`, b.dogId, b, 'bg-yellow-100 text-yellow-600', 'fa-exclamation-triangle');
                    }
                }
            }
        });

        const colorWeight = { 'bg-red-100 text-red-600': 1, 'bg-orange-100 text-orange-600': 2, 'bg-yellow-100 text-yellow-600': 3, 'bg-blue-100 text-blue-600': 4 };
        newTasks.sort((a, b) => {
            if (a.isRead !== b.isRead) return a.isRead ? 1 : -1;
            return colorWeight[a.colorClass] - colorWeight[b.colorClass];
        });

        setTasks(newTasks);
        
        const unreadCount = newTasks.filter(t => !t.isRead).length;
        window.dispatchEvent(new CustomEvent('updateBadge', { detail: unreadCount }));

    }, [dogs, bookings]);

    useEffect(() => { generateTasks(); }, [generateTasks]);

    const handleTaskClick = (task) => {
        if (task.type === 'dog') {
            const dog = dogs.find(d => d.id === task.dogId);
            if (dog) openForm('dog', dog);
        } else if (task.type === 'booking') {
            openForm('edit', task.bookingId);
        }
    };

    const unread = tasks.filter(t => !t.isRead).length;

    return (
        <div className="scroll-view p-4 bg-stone-50">
            <div className="flex justify-between items-end mb-6">
                <h2 className="text-2xl font-serif font-bold text-stone-700">À Faire</h2>
                <span className="text-xs font-bold text-stone-400 bg-stone-200 px-2 py-1 rounded-lg">{unread} à traiter</span>
            </div>

            {tasks.length === 0 ? (
                <div className="text-center mt-20">
                    <div className="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner"><i className="fas fa-check"></i></div>
                    <p className="text-stone-500 font-bold">Tout est à jour !</p>
                    <p className="text-stone-400 text-sm mt-1">Vous n'avez aucune alerte en attente.</p>
                </div>
            ) : (
                <div>
                    <p className="text-[10px] text-stone-400 font-bold uppercase tracking-widest mb-4 flex justify-between"><span><i className="fas fa-arrows-alt-h mr-1"></i> Glisser pour gérer</span></p>
                    {tasks.map(t => (
                        <SwipeableTask 
                            key={t.id} 
                            task={t} 
                            onMarkRead={(id) => saveTaskState(id, 'read')} 
                            onDelete={(id) => saveTaskState(id, 'deleted')} 
                            onClick={handleTaskClick} 
                        />
                    ))}
                </div>
            )}
        </div>
    );
};

        return () => { clearTimeout(timer); unsub(); };
    }, []);

    const login = async () => { setLoadingAuth(true); try { const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); if (isMobile) { await window.signInWithRedirect(window.auth, window.googleProvider); } else { await window.signInWithPopup(window.auth, window.googleProvider); } } catch (e) { alert("Erreur connexion: " + e.message); setLoadingAuth(false); } };

    const openForm = (type, data = {}) => {
        pushHistory(); setEditId(data.id || null); setIsDogMode(type === 'dog');
        let initialData = defForm;
        if (type === 'dog') { 
            initialData = { ...data, dogId: data.id, dogName: data.name, ownerName: data.owner, breed: data.breed, phone: data.phone, dogNotes: data.notes, gallery: data.gallery || (data.photo ? [data.photo] : []), photo: data.photo, eval: data.eval || {}, gender: data.gender || 'U', birthdate: data.birthdate || '' }; 
            setIsEditing(isOffline ? false : true); 
        } else if (type === 'edit') { 
            initialData = { ...data, bookingNotes: data.notes || "" }; 
            const linkedDog = dogs.find(d => d.id === data.dogId);
            if (linkedDog) { initialData.dogNotes = linkedDog.notes || ""; if (!initialData.phone) initialData.phone = linkedDog.phone; initialData.gallery = linkedDog.gallery || (linkedDog.photo ? [linkedDog.photo] : []); initialData.photo = linkedDog.photo; initialData.eval = linkedDog.eval || {}; initialData.birthdate = linkedDog.birthdate || ''; }
            initialData.isAllDay = data.isAllDay === undefined ? true : data.isAllDay; initialData.startTime = data.startTime || defForm.startTime; initialData.endTime = data.endTime || defForm.endTime; initialData.gender = data.gender || (dogs.find(d => d.id === data.dogId)?.gender) || 'U'; initialData.isProvisional = data.isProvisional === undefined ? false : data.isProvisional; setIsEditing(false); 
        } else if (type === 'new') { 
            initialData = { ...defForm, start: data.date || '' }; 
            setIsEditing(isOffline ? false : true); 
        }
        setForm(initialData); setModal(true);
    };

    const openRange = () => { pushHistory(); const startDate = form.start || null; const endDate = form.end || null; const startObj = startDate && !isNaN(new Date(startDate)) ? new Date(startDate) : null; const endObj = endDate && !isNaN(new Date(endDate)) ? new Date(endDate) : null; setRangeSel({ start: startObj, end: endObj }); setPickerViewDate(startObj || new Date()); setIsRangeOpen(true); };
    const handleRangeClick = (d) => { let { start, end } = rangeSel; if (!start || (start && end)) { setRangeSel({ start: d, end: null }); } else { const s = d < start ? d : start; const e = d < start ? start : d; setRangeSel({ start: s, end: e }); setTimeout(() => { const toLocal = (dt) => { const offset = dt.getTimezoneOffset() * 60000; return new Date(dt.getTime() - offset).toISOString().split('T')[0]; }; setForm(prev => ({ ...prev, start: toLocal(s), end: toLocal(e) })); setIsRangeOpen(false); }, 300); } };
    
    const save = async () => { 
        if (!window.fire) return alert("Firebase HS"); 
        try { 
            const { addDoc, updateDoc, doc, collection } = window.fire; const db = window.db; let dId = form.dogId; const clean = (val) => val === undefined || val === null ? "" : val; const newColor = internalGetGenderColor(form.gender, dId); 
            const dogData = { name: clean(form.dogName)||"Inconnu", breed: clean(form.breed), owner: clean(form.ownerName), phone: clean(form.phone), notes: clean(form.dogNotes), photo: form.photo||null, gallery: form.gallery || [], eval: form.eval || {}, color: newColor, gender: form.gender, birthdate: clean(form.birthdate) }; 
            if (dId) { await updateDoc(doc(db, "dogs", dId), dogData); } else { const ref = await addDoc(collection(db, "dogs"), {...dogData}); dId = ref.id; } 
            if (!isDogMode) { 
                const isAllDay = form.isAllDay; let startDate = clean(form.start) || ''; let endDate = clean(form.end) || ''; 
                if (!startDate || !endDate) { alert("Veuillez sélectionner une période de séjour valide."); return; } 
                if (!isAllDay) { const baseStart = startDate.includes('T') ? startDate.split('T')[0] : startDate; const baseEnd = endDate.includes('T') ? endDate.split('T')[0] : endDate; startDate = baseStart + 'T' + clean(form.startTime) + ':00'; endDate = baseEnd + 'T' + clean(form.endTime) + ':00'; } else if (startDate.includes('T')) { startDate = startDate.split('T')[0]; endDate = endDate.split('T')[0]; } 
                let price = clean(form.price) || "0"; let deposit = clean(form.deposit) || ""; if (form.paymentStatus === 'appointment') { price = "0"; deposit = ""; } 
                const bookData = { dogId: dId, dogName: clean(form.dogName), breed: clean(form.breed), ownerName: clean(form.ownerName), phone: clean(form.phone), price: price, start: startDate, end: endDate, color: newColor, notes: clean(form.bookingNotes), source: clean(form.source), paymentStatus: form.paymentStatus||'pending', deposit: deposit, isAllDay: isAllDay, startTime: clean(form.startTime), endTime: clean(form.endTime), photo: form.photo || null, gender: form.gender, isProvisional: form.isProvisional || false }; 
                if (editId) { await updateDoc(doc(db, "bookings", editId), bookData); } else { await addDoc(collection(db, "bookings"), bookData); } 
            } 
            setModal(false); setIsEditing(false); 
        } catch (err) { console.error(err); alert("Erreur: "+err.message); } 
    };
    
    const remove = async () => { if(!confirm("Supprimer ?")) return; const { deleteDoc, doc } = window.fire; const db = window.db; if (isDogMode) { await deleteDoc(doc(db, "dogs", form.id)); setSelectedDog(null); } else { await deleteDoc(doc(db, "bookings", editId)); } setModal(false); setIsEditing(false); };
    
    const handleFabClick = () => { 
        if (isOffline) { alert("Action impossible hors ligne."); return; }
        if (view === 'directory') { openForm('dog', {}); } 
        else { openForm('new', {}); } 
    };

    if (splash || loadingAuth) return ( <div className="fixed inset-0 z-[100] bg-[#fafaf9] flex flex-col items-center justify-center"><img src="logo.png" className="w-32 h-32 rounded-3xl shadow-2xl mb-6 object-cover border-4 border-white" /><h1 className="text-4xl font-serif font-bold text-stone-700 tracking-tight text-center">Bonjour Chouchou,<br/>je t'aime</h1><div className="text-sm text-stone-400 font-bold uppercase tracking-widest mt-2 text-center">4 Pattes Manager</div></div> );
    if (!user) return ( <div className="login-screen"><img src="logo.png" className="w-24 h-24 rounded-3xl shadow-xl mb-6" /><h2 className="text-xl font-bold text-stone-600 mb-4">Connexion Requise</h2><button onClick={login} className="google-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-6 h-6"/>Se connecter avec Google</button></div> );

    return (
        <div className="flex flex-col h-full bg-stone-50">
            {isOffline && (
                <div className="bg-red-500 text-white text-[11px] font-bold py-1.5 px-4 text-center shadow-md z-[100] relative shrink-0 flex items-center justify-center gap-2 tracking-widest">
                    <i className="fas fa-wifi-slash"></i> MODE HORS LIGNE (LECTURE SEULE)
                </div>
            )}
            
            <div className="flex-1 overflow-hidden relative">
                {view==='calendar' && <Calendar date={date} setDate={setDate} openForm={openForm} bookings={bookings} dogs={dogs} isOffline={isOffline} />}
                {view==='directory' && <Directory dogs={dogs} bookings={bookings} openForm={openForm} pickDog={pickDog} setSelectedDog={setSelectedDog} selectedDog={selectedDog} onOpenGallery={openGalleryForDog} isOffline={isOffline} />} 
                {view==='stats' && <Stats dogs={dogs} bookings={bookings} />} 
                {view==='assistant' && <AssistantPage dogs={dogs} bookings={bookings} openForm={openForm} />}
            </div>
            
            <div className={S.nav}>
                <div className="flex gap-8">
                    <div onClick={()=>setView('calendar')} className={S.iconBox}><i className={`fas fa-calendar-alt text-2xl ${view==='calendar'?S.active:S.inactive}`}></i><span className="text-[10px] font-bold mt-1">Agenda</span></div>
                    <div onClick={()=>setView('directory')} className={S.iconBox}><i className={`fas fa-address-book text-2xl ${view==='directory'?S.active:S.inactive}`}></i><span className="text-[10px] font-bold mt-1">Carnet</span></div>
                </div>
                
                {!isOffline && (
                    <div className={S.fabPos}><button onClick={handleFabClick} className={S.fab}><i className={`fas ${view === 'directory' ? 'fa-dog' : 'fa-plus'} text-2xl`}></i></button></div>
                )}

                <div className="flex justify-end gap-6">
                    <div onClick={()=>setView('assistant')} className={S.iconBox}>
                        <div className="relative">
                            <i className={`fas fa-bell text-2xl ${view==='assistant'?S.active:S.inactive}`}></i>
                            {badgeCount > 0 && <div className="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center rounded-full shadow-sm">{badgeCount}</div>}
                        </div>
                        <span className="text-[10px] font-bold mt-1">À Faire</span>
                    </div>
                    <div onClick={()=>setView('stats')} className={S.iconBox}><i className={`fas fa-chart-pie text-2xl ${view==='stats'?S.active:S.inactive}`}></i><span className="text-[10px] font-bold mt-1">Stats</span></div>
                </div>
            </div>
            
            {isRangeOpen && <RangePickerModal isRangeOpen={isRangeOpen} setIsRangeOpen={setIsRangeOpen} rangeSel={rangeSel} setRangeSel={setRangeSel} pickerViewDate={pickerViewDate} setPickerViewDate={setPickerViewDate} handleRangeClick={handleRangeClick} />}
            <DogPickerModal isOpen={isDogPickerOpen} onClose={() => setIsDogPickerOpen(false)} onSelect={(d) => selectDogFromPicker(d)} dogs={dogs} />
            <GalleryModal isOpen={isGalleryOpen} onClose={() => setIsGalleryOpen(false)} photos={form.gallery || []} onAdd={handleGalleryAdd} onDelete={handleGalleryDelete} onView={(img) => { pushHistory(); setFullImg(img); }} onSetProfile={handleSetProfile} isEditing={isEditing} isOffline={isOffline} />
            
            {modal && (
                <div className="overlay-base modal-reservation"><div className={S.modal}><div className={S.modalHead}>
                    {editId && !isDogMode && !isEditing && !isOffline && ( <div className="absolute left-4 top-1/2 transform -translate-y-1/2"> <EditButtonComponent onClick={() => setIsEditing(true)} /> </div> )}
                    <h3 className="font-bold text-lg text-stone-700 mx-auto">{isDogMode?'Fiche Chien':(editId?'Modifier Réservation':'Nouvelle Réservation')}</h3>
                    <button onClick={()=>setModal(false) & setIsEditing(false)} className="text-stone-500 font-bold">✕</button>
                </div><div className="flex-1 overflow-y-auto p-4 space-y-4">
                    <div className="flex gap-4 items-center">
                        <div onClick={() => setIsGalleryOpen(true)} className="relative w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center overflow-hidden border-2 border-stone-200 shrink-0 cursor-pointer active:scale-95 transition-transform group hover:border-blue-400">{form.photo ? <img src={form.photo} className="w-full h-full object-cover"/> : <span className="text-2xl text-stone-300">📷</span>}</div>
                        <div className="flex-1">
                            {!isDogMode && ( <div className="flex items-center gap-2 mb-2"><input className="flex-1 p-2 rounded-lg bg-stone-100 text-xs border border-stone-200 focus:ring-rose-200 outline-none text-stone-600" list="dogs-list" placeholder="Nom du chien..." onChange={e => { const name = e.target.value; setForm({...form, dogName: name}); const d = dogs.find(x => x.name.toLowerCase() === name.toLowerCase()); if(d) selectDogFromPicker(d); }} value={form.dogName} disabled={!isEditing && editId} /> <datalist id="dogs-list">{dogs.map(d=><option key={d.id} value={d.name}></option>)}</datalist> <OpenDirectoryButton onOpen={openDogPicker} isEditing={isEditing} /> </div> )}
                            { (editId || isDogMode) && <input className={S.input} value={form.dogName||''} onChange={e=>setForm({...form, dogName:e.target.value})} placeholder="Nom Chien" disabled={!isEditing}/> }
                            <input className={S.input} value={form.breed||''} onChange={e=>setForm({...form, breed:e.target.value})} placeholder="Race" disabled={!isEditing}/>
                            <GenderSwitchComponent form={form} setForm={setForm} isEditing={isEditing} />
                        </div>
                    </div>
                    {!isDogMode && (<div>
                        <div onClick={isEditing ? openRange : null} className={`bg-rose-50 p-4 rounded-2xl border border-rose-100 flex justify-between items-center ${isEditing ? 'cursor-pointer active:bg-rose-100' : 'cursor-default'} transition mb-2`}><div><div className="text-xs font-bold text-rose-400 uppercase mb-1">Séjour</div><div className="font-bold text-stone-700 text-lg leading-tight">{form.start ? new Date(form.start).toLocaleDateString(undefined, {day:'numeric', month:'short'}) : 'Arrivée'} ➝ {form.end ? new Date(form.end).toLocaleDateString(undefined, {day:'numeric', month:'short'}) : 'Départ'}</div></div>{isEditing && <i className="fas fa-calendar-alt text-rose-300 text-2xl"></i>}</div>
                        <div className="flex items-center gap-4 mb-2"><div className="flex items-center gap-2"><input type="checkbox" checked={form.isAllDay} onChange={(e) => isEditing && setForm({...form, isAllDay: e.target.checked})} className="w-4 h-4 text-rose-600 bg-gray-100 border-gray-300 rounded focus:ring-rose-500" disabled={!isEditing} /> <label className="text-sm font-medium text-stone-700">Journée entière</label></div><div className="flex items-center gap-2"><input type="checkbox" checked={form.isProvisional} onChange={(e) => isEditing && setForm({...form, isProvisional: e.target.checked})} className="w-4 h-4 text-rose-600 bg-gray-100 border-gray-300 rounded focus:ring-rose-500" disabled={!isEditing} /> <label className="text-sm font-medium text-stone-700">Provisoire</label></div></div>
                        {!form.isAllDay && (<div className="flex gap-2 mt-2 mb-4"><div className="flex-1"><label className={S.label}>Heure Arrivée</label><input type="time" className={S.input} value={form.startTime||''} onChange={e=>setForm({...form, startTime:e.target.value})} disabled={!isEditing}/></div><div className="flex-1"><label className={S.label}>Heure Départ</label><input type="time" className={S.input} value={form.endTime||''} onChange={e=>setForm({...form, endTime:e.target.value})} disabled={!isEditing}/></div></div>)}
                        <label className={S.label}>SOURCE</label><input className={S.input} list="sources" value={form.source||''} onChange={e=>setForm({...form, source:e.target.value})} placeholder="ex: Rover, Fidélisé..." disabled={!isEditing}/><datalist id="sources"><option value="Le Bon Coin"/><option value="Rover"/><option value="Animaute"/><option value="Fidélisé"/><option value="Bouche à oreille"/></datalist></div>)}
                        <input className={S.input} value={form.ownerName||''} onChange={e=>setForm({...form, ownerName:e.target.value})} placeholder="Propriétaire" disabled={!isEditing}/>
                        <input className={S.input} type="tel" value={form.phone||''} onChange={e=>setForm({...form, phone:e.target.value})} placeholder="Téléphone" disabled={!isEditing}/>
                        <div className="mt-2"><label className={S.label}>Date de Naissance</label><input className={S.input} type="text" value={form.birthdate||''} onChange={e=>setForm({...form, birthdate:e.target.value})} placeholder="JJ/MM/AAAA ou MM/AAAA" disabled={!isEditing}/></div>
                        {!isDogMode && (<div><div className="flex gap-2 mb-2"><div className="flex-1"><label className={S.label}>PRIX TOTAL</label><input type="number" value={form.price||''} onChange={e=>setForm({...form, price:e.target.value})} placeholder="€" disabled={!isEditing || form.paymentStatus === 'appointment'} className={S.input} /></div><div className="flex-1"><label className={S.label}>PAIEMENT</label><select className={S.input} value={form.paymentStatus||'pending'} onChange={e=>setForm({...form, paymentStatus:e.target.value, price: e.target.value === 'appointment' ? '0' : form.price, deposit: e.target.value === 'appointment' ? '' : form.deposit })} disabled={!isEditing}><option value="pending">🔴 À Payer</option><option value="deposit">🟠 Acompte</option><option value="paid">🟢 Payé</option><option value="appointment">🗓️ RDV</option></select></div></div>{form.paymentStatus === 'deposit' && (<div className="bg-orange-50 p-2 rounded-lg border border-orange-100 flex items-center gap-2 mb-2"><input className="w-20 p-1 text-sm border rounded" type="number" placeholder="Reçu" value={form.deposit||''} onChange={e=>setForm({...form, deposit:e.target.value})} disabled={!isEditing}/><span className="text-xs text-orange-800 font-bold">€ reçu. Reste : <span className="text-lg">{(form.price||0) - (form.deposit||0)} €</span></span></div>)}</div>)}
                        
                        <label className={S.label}>Notes Permanentes (Fiche Chien) - ⚠ Modifie le profil</label><textarea className={`${S.input} h-20 bg-yellow-50 border-yellow-200`} value={form.dogNotes||''} onChange={e=>setForm({...form, dogNotes:e.target.value})} placeholder="Allergies, comportement..." disabled={!isEditing}/>
                        {!isDogMode && (<><label className={S.label}>Notes de ce Séjour (Spécifique)</label><textarea className={`${S.input} h-20`} value={form.bookingNotes||''} onChange={e=>setForm({...form, bookingNotes:e.target.value})} placeholder="Apportera ses croquettes..." disabled={!isEditing}/></>)}

                        <BehaviorEvaluation evalData={form.eval} setForm={setForm} isEditing={isEditing} />

                    </div>
                    <div className="p-4 bg-white border-t flex flex-col gap-2">
                        {isEditing && !isOffline && <button onClick={save} className={S.btn}>Valider</button>}
                        {(editId||isDogMode) && isEditing && !isOffline && <button onClick={remove} className="text-red-400 font-bold px-4 py-2 mt-2 w-full">Supprimer</button>}
                        {isOffline && <div className="text-red-500 text-xs font-bold italic w-full text-center py-2">Modifications désactivées (Hors Ligne)</div>}
                    </div>
                </div></div>
            )}
            
            {fullImg && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center bg-stone-900/90 backdrop-blur-sm p-4" onClick={() => { setFullImg(null); window.history.back(); }}>
                    <img src={fullImg} className="max-w-full max-h-full object-contain rounded-lg shadow-2xl"/>
                </div>
            )}
        </div>
    );
}
const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
    const swCode = `
        const CACHE_NAME = '4pattes-cache-v1.4'; 
        
        self.addEventListener('fetch', event => {
            if (event.request.method !== 'GET' || !event.request.url.startsWith('http')) return;
            
            event.respondWith(
                fetch(event.request)
                    .then(response => {
                        const responseClone = response.clone();
                        caches.open(CACHE_NAME).then(cache => {
                            cache.put(event.request, responseClone);
                        });
                        return response;
                    })
                    .catch(() => {
                        return caches.match(event.request);
                    })
            );
        });

        self.addEventListener('activate', event => {
            event.waitUntil(
                caches.keys().then(cacheNames => {
                    return Promise.all(
                        cacheNames.map(cacheName => {
                            if (cacheName !== CACHE_NAME) {
                                return caches.delete(cacheName);
                            }
                        })
                    );
                })
            );
        });
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(err => console.log('SW error', err));
}
</script>
